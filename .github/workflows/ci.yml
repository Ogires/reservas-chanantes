name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Lint · Types · Tests+Coverage · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npx tsc --noEmit
      - name: Unit tests + coverage (fails below the threshold)
        run: npm run test:coverage
      - name: Production build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    # Se ejecuta bajo demanda: recorre el despliegue de verdad (crea datos de
    # prueba), por eso no se lanza en cada push.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: E2E contra el despliegue
        run: npm run test:e2e
