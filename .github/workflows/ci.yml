name: CI

on:
  push:
    branches: [main]
    # Los cambios solo-documentación no tocan la app: no re-desplegar por ellos
    # (evita consumir la cuota de subida de Vercel y despliegues idénticos).
    paths-ignore:
      - 'docs/**'
      - 'scratchpad/**'
      - '**/*.md'
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Lint · Types · Tests+Coverage · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npx tsc --noEmit
      - name: Unit tests + coverage (fails below the threshold)
        run: npm run test:coverage
      - name: Production build
        run: npm run build

  deploy:
    name: Deploy to production (Vercel)
    needs: [quality]                 # ← solo se ejecuta si quality pasa (pipeline encadenado)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm i -g vercel@latest
      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (con env real de producción)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt to production
        run: |
          url=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "Production deploy: $url" >> "$GITHUB_STEP_SUMMARY"

  preview:
    name: Deploy preview (Vercel)
    needs: [quality]                 # ← preview también gated: solo si quality pasa
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm i -g vercel@latest
      - name: Pull Vercel env (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt preview
        run: |
          url=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview deploy: $url" >> "$GITHUB_STEP_SUMMARY"

  e2e:
    name: E2E (Playwright)
    # Se ejecuta bajo demanda: recorre el despliegue de verdad (crea datos de
    # prueba), por eso no se lanza en cada push.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: E2E cross-browser contra el despliegue
        run: npm run test:e2e
